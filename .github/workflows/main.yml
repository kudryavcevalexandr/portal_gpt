name: Build APK
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Buildozer Action
        uses: ArtemSerebrennkov/buildozer-action@v1
        with:
          workdir: android-app/PortalGPT_app
          buildozer_version: master
